<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Dark background tile -->
  <rect width="16" height="16" rx="3" fill="#1A1008"/>

  <!-- Steam: left wisp (zigzag left) -->
  <rect x="4" y="1" width="1" height="1" fill="#6B4E30"/>
  <rect x="3" y="2" width="1" height="1" fill="#6B4E30"/>
  <rect x="4" y="3" width="1" height="1" fill="#6B4E30"/>

  <!-- Steam: right wisp (zigzag right) -->
  <rect x="7" y="1" width="1" height="1" fill="#6B4E30"/>
  <rect x="8" y="2" width="1" height="1" fill="#6B4E30"/>
  <rect x="7" y="3" width="1" height="1" fill="#6B4E30"/>

  <!-- Cup rim -->
  <rect x="2" y="4" width="9" height="1" fill="#C4956A"/>

  <!-- Cup left wall -->
  <rect x="2" y="5" width="1" height="5" fill="#C4956A"/>
  <!-- Cup right wall -->
  <rect x="10" y="5" width="1" height="5" fill="#C4956A"/>
  <!-- Coffee liquid -->
  <rect x="3" y="5" width="7" height="5" fill="#3D1C08"/>
  <!-- Coffee surface highlight -->
  <rect x="4" y="5" width="2" height="1" fill="#5C3010"/>

  <!-- Handle: top connector, right bar, bottom connector -->
  <rect x="11" y="5" width="1" height="1" fill="#C4956A"/>
  <rect x="12" y="6" width="1" height="3" fill="#C4956A"/>
  <rect x="11" y="9" width="1" height="1" fill="#C4956A"/>

  <!-- Cup base taper -->
  <rect x="3" y="10" width="7" height="1" fill="#A0724A"/>
  <rect x="4" y="11" width="5" height="1" fill="#8B6040"/>

  <!-- Saucer -->
  <rect x="1" y="12" width="11" height="1" fill="#8B6F4E"/>
  <rect x="2" y="13" width="9" height="1" fill="#5C3F20"/>
</svg>
